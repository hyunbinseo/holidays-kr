# See https://docs.npmjs.com/trusted-publishers
# See https://pnpm.io/continuous-integration

name: Publish Package

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/setup@v1
        with:
          runtime: node@lts
      - run: pnpm stage publish --no-git-checks --access public
